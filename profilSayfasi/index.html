<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geliştirici Profili</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #f5f7fa; 
            font-family: 'Inter', -apple-system, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; color: #2d3436;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 90%;
            text-align: left;
        }
        .badge {
            background: #e1f5fe;
            color: #03a9f4;
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: inline-block;
        }
        h1 { font-size: 32px; margin-bottom: 15px; letter-spacing: -0.5px; }
        p { line-height: 1.6; color: #636e72; margin-bottom: 30px; font-size: 17px; }
        .btn {
            display: inline-block;
            background: #2d3436;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn:hover { background: #000; transform: translateY(-2px); }
        .footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; font-size: 14px; color: #b2bec3; }
    </style>
</head>
<body>

    <div class="card">
        <span class="badge">Yeni Başlangıç</span>
        <h1>Geliştirme aşamasındayım.</h1>
        <p>Yazılım dünyasına giriş biletimi buraya bıraktım. Şimdilik sadece bu sayfa var ama yakında buralar kodlarla, hatalarla ve (umarım) çalışan projelerle dolacak. Takipte kalın.</p>
        
        <a href="https://github.com/KULLANICI_ADIN" class="btn">Projelerime Göz At</a>

        <div class="footer">
            2026 •
        </div>
    </div>

</body>
</html>
