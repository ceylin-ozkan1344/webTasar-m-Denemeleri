<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hesap Makinesi</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; background: #fff;
        }
        .calc { 
            width: 260px; 
            border: 1px solid #333; 
            padding: 20px;
        }
        #display { 
            width: 100%; 
            height: 50px; 
            font-size: 20px; 
            text-align: right; 
            margin-bottom: 15px; 
            border: 1px solid #333;
            padding: 5px;
            box-sizing: border-box;
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
        }
        button { 
            height: 45px; 
            background: none; 
            border: 1px solid #333; 
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #f0f0f0; }
        .wide { grid-column: span 2; }
    </style>
</head>
<body>

    <div class="calc">
        <input type="text" id="display" disabled>
        <div class="grid">
            <button onclick="clr()" class="wide">Temizle</button>
            <button onclick="del()">←</button>
            <button onclick="add('/')">/</button>
            
            <button onclick="add('7')">7</button>
            <button onclick="add('8')">8</button>
            <button onclick="add('9')">9</button>
            <button onclick="add('*')">*</button>
            
            <button onclick="add('4')">4</button>
            <button onclick="add('5')">5</button>
            <button onclick="add('6')">6</button>
            <button onclick="add('-')">-</button>
            
            <button onclick="add('1')">1</button>
            <button onclick="add('2')">2</button>
            <button onclick="add('3')">3</button>
            <button onclick="add('+')">+</button>
            
            <button onclick="add('0')">0</button>
            <button onclick="add('.')">.</button>
            <button onclick="calc()" class="wide">=</button>
        </div>
    </div>

    <script>
        let d = document.getElementById('display');
        function add(v) { d.value += v; }
        function clr() { d.value = ""; }
        function del() { d.value = d.value.slice(0, -1); }
        function calc() {
            try { d.value = eval(d.value); }
            catch { d.value = "Hata"; }
        }
    </script>

</body>
</html>
