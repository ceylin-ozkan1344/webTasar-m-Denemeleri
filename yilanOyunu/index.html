<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>snake</title>
    <style>
        body {
            margin: 0; background: #050505; color: #fff;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'Poppins', sans-serif; overflow: hidden;
        }
        #ui-layer {
            position: absolute; top: 20px; width: 400px;
            display: flex; justify-content: space-between;
            background: rgba(255, 255, 255, 0.1); padding: 10px 20px;
            border-radius: 15px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); box-sizing: border-box;
        }
        canvas {
            border-radius: 20px; box-shadow: 0 0 50px rgba(0, 255, 127, 0.2);
            background: #0a0a0a; border: 2px solid #111;
        }
        #game-over {
            position: absolute; display: none; text-align: center;
            background: rgba(0, 0, 0, 0.85); padding: 40px;
            border-radius: 20px; border: 1px solid #ff3e3e;
            backdrop-filter: blur(10px);
        }
        button {
            background: #00ff7f; border: none; padding: 10px 25px;
            border-radius: 8px; cursor: pointer; font-weight: bold;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.1); background: #00db6d; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div>SKOR: <span id="score">0</span></div>
    <div>HIZ: %<span id="speed">100</span></div>
</div>

<canvas id="gameCanvas" width="400" height="400"></canvas>

<div id="game-over">
    <h1 style="color: #ff3e3e; margin-top: 0;">OYUN BİTTİ</h1>
    <p id="final-score"></p>
    <button onclick="resetGame()">TEKRAR DENE</button>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const speedEl = document.getElementById("speed");
    const gameOverEl = document.getElementById("game-over");

    const box = 20;
    let score, snake, food, d, gameSpeed, gameLoop;

    function init() {
        score = 0;
        snake = [{x: 10 * box, y: 10 * box}, {x: 9 * box, y: 10 * box}];
        food = spawnFood();
        d = "RIGHT";
        gameSpeed = 150; 
        updateUI();
        if(gameLoop) clearTimeout(gameLoop);
        runGame();
    }

    document.addEventListener("keydown", e => {
        if(e.keyCode == 37 && d != "RIGHT") d = "LEFT";
        if(e.keyCode == 38 && d != "DOWN") d = "UP";
        if(e.keyCode == 39 && d != "LEFT") d = "RIGHT";
        if(e.keyCode == 40 && d != "UP") d = "DOWN";
    });

    function spawnFood() {
        return {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };
    }

    function draw() {
        
        ctx.fillStyle = "#0a0a0a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        
        const pulse = Math.sin(Date.now() / 100) * 3;
        ctx.fillStyle = "#ff3e3e";
        ctx.shadowBlur = 15 + pulse;
        ctx.shadowColor = "#ff3e3e";
        ctx.beginPath();
        ctx.arc(food.x + box/2, food.y + box/2, (box/2 - 2) + pulse/2, 0, Math.PI*2);
        ctx.fill();

        
        snake.forEach((part, index) => {
            const isHead = index === 0;
            ctx.fillStyle = isHead ? "#00ff7f" : "#00a351";
            ctx.shadowBlur = isHead ? 20 : 0;
            ctx.shadowColor = "#00ff7f";
            
            
            roundRect(ctx, part.x + 1, part.y + 1, box - 2, box - 2, 5);

            
            if(isHead) {
                ctx.fillStyle = "white";
                ctx.shadowBlur = 0;
                if(d === "RIGHT" || d === "LEFT") {
                    ctx.fillRect(part.x + 12, part.y + 4, 4, 4);
                    ctx.fillRect(part.x + 12, part.y + 12, 4, 4);
                } else {
                    ctx.fillRect(part.x + 4, part.y + 12, 4, 4);
                    ctx.fillRect(part.x + 12, part.y + 12, 4, 4);
                }
            }
        });

        let sX = snake[0].x;
        let sY = snake[0].y;

        if(d == "LEFT") sX -= box;
        if(d == "UP") sY -= box;
        if(d == "RIGHT") sX += box;
        if(d == "DOWN") sY += box;

        if(sX == food.x && sY == food.y) {
            score++;
            food = spawnFood();
            
            gameSpeed = Math.max(40, gameSpeed * 0.97); 
            updateUI();
        } else {
            snake.pop();
        }

        let newHead = {x: sX, y: sY};

        if(sX < 0 || sX >= canvas.width || sY < 0 || sY >= canvas.height || collision(newHead, snake)) {
            endGame();
            return;
        }

        snake.unshift(newHead);
        gameLoop = setTimeout(runGame, gameSpeed);
    }

    function runGame() { draw(); }

    function collision(head, array) {
        return array.some(p => p.x === head.x && p.y === head.y);
    }

    function updateUI() {
        scoreEl.innerText = score;
        const speedPercent = Math.round((150 / gameSpeed) * 100);
        speedEl.innerText = speedPercent;
    }

    function endGame() {
        gameOverEl.style.display = "block";
        document.getElementById("final-score").innerText = "Skorun: " + score;
    }

    function resetGame() {
        gameOverEl.style.display = "none";
        init();
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x+r, y); ctx.arcTo(x+w, y, x+w, y+h, r);
        ctx.arcTo(x+w, y+h, x, y+h, r); ctx.arcTo(x, y+h, x, y, r);
        ctx.arcTo(x, y, x+w, y, r); ctx.closePath(); ctx.fill();
    }

    init();
</script>
</body>
</html>
